<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mỗi Ngày Một Món</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111, #222);
      color: #fff;
    }

    .wrap {
      max-width: 650px;
      margin: auto;
      padding: 28px 20px;
      text-align: center;
    }

    .avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      margin-bottom: 12px;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: 28px;
    }

    .desc {
      opacity: 0.9;
      margin-bottom: 24px;
      line-height: 1.6;
      font-size: 16px;
    }

    .btn {
      display: block;
      background: #fff;
      color: #111;
      text-decoration: none;
      padding: 15px;
      margin: 12px 0;
      border-radius: 16px;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.02);
      background: #ffefef;
    }

    .footer {
      margin-top: 26px;
      font-size: 13px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <img src="avatar_moi_ngay_mot_mon.png" class="avatar" alt="Mỗi Ngày Một Món">

    <h1>Mỗi Ngày Một Món</h1>

    <div class="desc">
      Deal ngon • Đồ hot • Gia dụng thông minh mỗi ngày
    </div>

    <a class="btn" href="https://s.shopee.vn/3gLAoyosLm" target="_blank">
      🛒 Móc dán tường đa năng
    </a>

    <a class="btn" href="https://s.shopee.vn/1qZWdbvr4V" target="_blank">
      🔥 Xem thêm sản phẩm hot
    </a>

    <div class="footer">
      Theo dõi kênh để khám phá thêm nhiều sản phẩm hay mỗi ngày ❤️
    </div>
  </div>
</body>
</html>
